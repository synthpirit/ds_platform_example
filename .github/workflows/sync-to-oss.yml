name: Sync to OSS

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ossutil
        run: |
          curl -o ossutil https://gosspublic.alicdn.com/ossutil/1.7.15/ossutil64
          chmod +x ossutil
          sudo mv ossutil /usr/local/bin/

      - name: Configure ossutil
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ vars.OSS_ENDPOINT }}
        run: |
          ossutil config \
            -e $OSS_ENDPOINT \
            -i $OSS_ACCESS_KEY_ID \
            -k $OSS_ACCESS_KEY_SECRET

      - name: Sync to OSS
        env:
          OSS_BUCKET: ${{ vars.OSS_BUCKET }}
        run: |
          ossutil sync ./notebooks/ oss://$OSS_BUCKET/notebooks \
            --delete \
            --force
